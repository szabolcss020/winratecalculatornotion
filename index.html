<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Winrate Calculator - Multi-Storage</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
font-family: 'Inter', sans-serif;
    background: #191919;
    color: #e8e8e8;
    padding: 0px 16px;
    margin: 0;
    margin-top: 10px; 
    overflow-x: hidden;
  }
  .row {
display: flex;
    align-items: center;
    gap: 8px;
    padding: 0;
    border-bottom: 1px solid #2a2a2a;
    height: 42px; 
    box-sizing: border-box;
  }
  .num {
    height: 28px; 
    padding: 2px 8px;
    width: 72px;
    background: #2a2a2a;
    border: 1px solid #3a3a3a;
    border-radius: 5px;
    font-size: 13px;
    color: #e8e8e8;
    text-align: center;
    font-family: 'Inter', sans-serif;
  }
  .num:focus { outline: none; border-color: #555; }
  .sep { color: #444; font-size: 13px; }
  .result {
    font-size: 14px;
    font-weight: 600;
    min-width: 52px;
    color: #555;
  }
  /* 4 fokozatú színskála */
  .result.green  { color: #3ecf8e; } 
  .result.blue   { color: #3b82f6; } 
  .result.yellow { color: #f0a429; } 
  .result.red    { color: #e05252; } 
  
  .del {
    margin-left: auto;
    background: none;
    border: none;
    color: #444;
    font-size: 16px;
    cursor: pointer;
  }
  .add-btn {
    margin-top: 12px;
    background: none;
    border: 1px dashed #3a3a3a;
    border-radius: 5px;
    color: #555;
    font-size: 13px;
    padding: 6px 12px;
    cursor: pointer;
    width: 100%;
  }
</style>
</head>
<body>

<div id="rows"></div>
<button class="add-btn" onclick="addNewRow()">+ Új sor</button>

<script>
// --- ID KEZELÉS ---
const urlParams = new URLSearchParams(window.location.search);
const tableId = urlParams.get('id') || 'default'; 
const storageKey = 'winrateData_' + tableId; 

let rowCounter = 0;

function colorClass(pct) {
  if (isNaN(pct)) return "";
  if (pct >= 50) return "green";
  if (pct >= 40) return "blue";
  if (pct >= 35) return "yellow";
  return "red";
}

function saveToStorage() {
  const rowsData = [];
  document.querySelectorAll('.row').forEach(row => {
    const id = row.id.replace('row-', '');
    const w = document.getElementById(`w-${id}`).value;
    const t = document.getElementById(`t-${id}`).value;
    rowsData.push({ w, t });
  });
  localStorage.setItem(storageKey, JSON.stringify(rowsData));
}

function loadFromStorage() {
  const saved = localStorage.getItem(storageKey);
  if (saved) {
    const rowsData = JSON.parse(saved);
    if (rowsData.length > 0) {
      rowsData.forEach(data => addRow(data.w, data.t));
    } else {
      setupDefaultRows();
    }
  } else {
    setupDefaultRows();
  }
}

function setupDefaultRows() {
  addRow(); addRow(); addRow();
}

function deleteRow(id) {
  document.getElementById(`row-${id}`).remove();
  saveToStorage();
}

function addNewRow() {
  addRow();
  saveToStorage();
}

function addRow(valW = "", valT = "") {
  const id = rowCounter++;
  const container = document.getElementById("rows");
  const div = document.createElement("div");
  div.className = "row";
  div.id = `row-${id}`;
  div.innerHTML = `
    <input class="num" type="number" min="0" placeholder="Win" id="w-${id}" value="${valW}">
    <span class="sep">/</span>
    <input class="num" type="number" min="0" placeholder="Total" id="t-${id}" value="${valT}">
    <span class="sep">=</span>
    <span class="result" id="r-${id}">—</span>
    <button class="del" onclick="deleteRow(${id})">×</button>
  `;
  container.appendChild(div);

  const wEl = document.getElementById(`w-${id}`);
  const tEl = document.getElementById(`t-${id}`);
  const rEl = document.getElementById(`r-${id}`);

  function calc() {
    const w = parseFloat(wEl.value);
    const t = parseFloat(tEl.value);
    if (!isNaN(w) && !isNaN(t) && t > 0) {
      const pct = (w / t) * 100;
      rEl.textContent = pct.toFixed(1) + "%";
      rEl.className = "result " + colorClass(pct);
    } else {
      rEl.textContent = "—";
      rEl.className = "result";
    }
    saveToStorage();
  }

  wEl.addEventListener("input", calc);
  tEl.addEventListener("input", calc);
  if(valW !== "" || valT !== "") calc();
}

loadFromStorage();
</script>
</body>
</html>
